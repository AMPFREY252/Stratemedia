<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Test - Ampfrey</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
            font-size: 16px;
        }
        .btn:hover { background: #0056b3; }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .warning { background: #fff3cd; color: #856404; }
        .log {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Firebase Connection Test</h1>
        
        <div id="connectionStatus" class="status info">
            Testing Firebase connection...
        </div>
        
        <button class="btn" onclick="testConnection()">🔗 Test Connection</button>
        <button class="btn" onclick="createTestData()">📝 Create Test Data</button>
        <button class="btn" onclick="readTestData()">📖 Read Test Data</button>
        <button class="btn" onclick="clearAll()">🗑️ Clear All Data</button>
        
        <h3>Activity Log:</h3>
        <div id="activityLog" class="log">
            Starting Firebase test...
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAsKb9fP5e7iRktQzgnwdXcY5OtTyyk6t0",
            authDomain: "mywebsite-eb628.firebaseapp.com",
            databaseURL: "https://mywebsite-eb628-default-rtdb.firebaseio.com",
            projectId: "mywebsite-eb628",
            storageBucket: "mywebsite-eb628.firebasestorage.app",
            messagingSenderId: "389693477462",
            appId: "1:389693477462:web:c19746a41b3770611ee1f7",
            measurementId: "G-3KQQTT62TW"
        };

        let app;
        let database;
        let isConnected = false;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('activityLog');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.textContent += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
        }

        function testConnection() {
            log('🔗 Testing Firebase connection...');
            updateStatus('Testing connection...', 'info');

            try {
                // Test Firebase initialization
                app = initializeApp(firebaseConfig);
                database = getDatabase(app);
                
                log('✅ Firebase app initialized successfully');
                
                // Test database connection
                const connectedRef = database.ref('.info/connected');
                connectedRef.on('value', (snapshot) => {
                    isConnected = snapshot.val();
                    if (isConnected) {
                        log('🟢 Firebase connected successfully!');
                        updateStatus('✅ Connected to Firebase', 'success');
                    } else {
                        log('🔴 Firebase disconnected');
                        updateStatus('❌ Disconnected from Firebase', 'error');
                    }
                });

                // Test write permission
                setTimeout(() => {
                    if (isConnected) {
                        testWrite();
                    } else {
                        log('❌ Cannot test write - not connected');
                        updateStatus('❌ Connection failed', 'error');
                    }
                }, 2000);

            } catch (error) {
                log(`❌ Firebase error: ${error.message}`);
                updateStatus(`❌ Error: ${error.message}`, 'error');
            }
        }

        function testWrite() {
            log('📝 Testing write permission...');
            
            const testData = {
                test: 'Hello Firebase!',
                timestamp: new Date().toISOString(),
                type: 'connection_test'
            };

            database.ref('test').push(testData)
                .then(() => {
                    log('✅ Write permission working!');
                    updateStatus('✅ Read/Write permissions OK', 'success');
                })
                .catch((error) => {
                    log(`❌ Write permission denied: ${error.message}`);
                    updateStatus('❌ Write permission denied', 'error');
                });
        }

        function createTestData() {
            if (!isConnected) {
                log('❌ Not connected to Firebase');
                updateStatus('❌ Please connect first', 'error');
                return;
            }

            log('📝 Creating test collections...');
            
            // Create contacts collection
            database.ref('contacts').push({
                name: "Test User",
                email: "test@example.com",
                subject: "Test Message",
                message: "This is a test message from setup",
                timestamp: new Date().toISOString(),
                read: false,
                replied: false,
                status: "pending"
            }).then(() => {
                log('✅ Contacts collection created');
            }).catch(error => {
                log(`❌ Contacts error: ${error.message}`);
            });

            // Create settings
            database.ref('settings').set({
                siteTitle: "Ampfrey Tukwasibwe",
                siteDescription: "Portfolio Website",
                contactEmail: "ampfrey@example.com",
                updatedAt: new Date().toISOString()
            }).then(() => {
                log('✅ Settings collection created');
            }).catch(error => {
                log(`❌ Settings error: ${error.message}`);
            });
        }

        function readTestData() {
            if (!isConnected) {
                log('❌ Not connected to Firebase');
                return;
            }

            log('📖 Reading test data...');
            
            database.ref('contacts').limitToLast(5).once('value')
                .then((snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const count = Object.keys(data).length;
                        log(`✅ Found ${count} contact(s) in database`);
                        updateStatus(`✅ ${count} contacts found`, 'success');
                    } else {
                        log('⚠️ No contacts found in database');
                        updateStatus('⚠️ No contacts found', 'warning');
                    }
                })
                .catch((error) => {
                    log(`❌ Read error: ${error.message}`);
                    updateStatus('❌ Read permission denied', 'error');
                });
        }

        function clearAll() {
            if (!isConnected) {
                log('❌ Not connected to Firebase');
                return;
            }

            if (confirm('⚠️ This will delete ALL data. Are you sure?')) {
                log('🗑️ Clearing all data...');
                
                database.ref().set({})
                    .then(() => {
                        log('✅ All data cleared from Firebase');
                        updateStatus('✅ Database cleared', 'success');
                    })
                    .catch((error) => {
                        log(`❌ Clear error: ${error.message}`);
                        updateStatus('❌ Clear failed', 'error');
                    });
            }
        }

        // Auto-test on load
        setTimeout(() => {
            testConnection();
        }, 1000);
    </script>
</body>
</html>
